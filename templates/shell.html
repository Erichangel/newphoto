<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>时光印记</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif; }

    #content-frame {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    /* ========== 音乐播放器 ========== */
    .music-player {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 100;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-top: 1px solid rgba(233, 30, 99, 0.15);
      padding: 8px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      box-shadow: 0 -4px 24px rgba(233, 30, 99, 0.12);
      transition: transform 0.3s ease;
      height: 52px;
    }
    .music-player.hidden { display: none !important; }
    .music-player.collapsed { transform: translateY(calc(100% - 36px)); }
    .music-player.collapsed:hover { transform: translateY(0); }
    .music-icon {
      width: 28px; height: 28px; border-radius: 50%;
      background: linear-gradient(135deg, #E91E63, #FF6090);
      color: white; border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; flex-shrink: 0; transition: transform 0.2s;
    }
    .music-icon:hover { transform: scale(1.1); }
    .music-info { flex: 1; min-width: 0; overflow: hidden; }
    .music-name {
      font-size: 12px; color: #C2185B; font-weight: 500;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .music-progress-wrap {
      position: relative; height: 14px; margin-top: 2px; cursor: pointer;
      display: flex; align-items: center;
    }
    .music-progress-wrap::before {
      content: ''; position: absolute; left: 0; right: 0; top: 50%;
      transform: translateY(-50%); height: 3px; background: rgba(233,30,99,0.12);
      border-radius: 2px;
    }
    .music-progress-bar {
      position: absolute; left: 0; top: 50%; transform: translateY(-50%);
      height: 3px; background: linear-gradient(90deg, #E91E63, #FF6090);
      border-radius: 2px; width: 0; pointer-events: none;
    }
    .music-progress-handle {
      position: absolute; top: 50%; transform: translate(-50%, -50%);
      width: 10px; height: 10px; border-radius: 50%;
      background: #E91E63; box-shadow: 0 0 4px rgba(233,30,99,0.3);
      left: 0; pointer-events: none; opacity: 0; transition: opacity 0.15s;
    }
    .music-progress-wrap:hover .music-progress-handle,
    .music-progress-wrap.dragging .music-progress-handle { opacity: 1; }
    .music-progress-wrap:hover::before,
    .music-progress-wrap.dragging::before { height: 4px; }
    .music-progress-wrap:hover .music-progress-bar,
    .music-progress-wrap.dragging .music-progress-bar { height: 4px; }
    .music-time {
      font-size: 10px; color: #aaa; margin-top: 1px;
      display: flex; gap: 2px;
    }
    .music-controls { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
    .music-btn {
      width: 30px; height: 30px; border-radius: 50%; border: none;
      background: transparent; color: #C2185B; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; transition: all 0.2s ease;
    }
    .music-btn:hover { background: rgba(233, 30, 99, 0.08); }
    .music-btn.play-btn {
      width: 34px; height: 34px;
      background: linear-gradient(135deg, #E91E63, #FF6090);
      color: white;
    }
    .music-btn.play-btn:hover { transform: scale(1.05); }
    .music-volume {
      width: 50px; height: 4px; appearance: none; -webkit-appearance: none;
      background: rgba(233, 30, 99, 0.15); border-radius: 2px; outline: none; cursor: pointer;
    }
    .music-volume::-webkit-slider-thumb {
      appearance: none; -webkit-appearance: none;
      width: 12px; height: 12px; border-radius: 50%; background: #E91E63; cursor: pointer;
    }
    .music-close-btn {
      width: 26px; height: 26px; border-radius: 50%; border: none;
      background: rgba(220, 38, 38, 0.08); color: #dc2626; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; flex-shrink: 0; transition: all 0.2s;
    }
    .music-close-btn:hover { background: #dc2626; color: white; }

    /* 音乐设置弹窗 */
    .modal-overlay {
      display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.4); z-index: 10001;
      justify-content: center; align-items: center;
    }
    .modal-overlay.active { display: flex; }
    .modal-box {
      background: white; border-radius: 16px; padding: 24px;
      max-width: 480px; width: 90%; max-height: 85vh; overflow-y: auto;
      box-shadow: 0 20px 60px rgba(0,0,0,0.15);
    }
    .modal-box h3 { margin-bottom: 16px; font-size: 16px; color: #333; }
    .modal-box label { display: block; font-size: 13px; color: #555; margin-bottom: 6px; font-weight: 500; }
    .modal-hint { font-size: 11px; color: #aaa; margin-top: 6px; }
    .modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 16px; }
    .modal-btn { padding: 8px 20px; border-radius: 8px; border: none; cursor: pointer; font-size: 13px; transition: all 0.2s; }
    .modal-btn-cancel { background: #f5f5f5; color: #666; }
    .modal-btn-confirm { background: linear-gradient(135deg, #E91E63, #FF6090); color: white; }
    .music-settings-content { max-height: 350px; overflow-y: auto; }
    .music-list-item {
      display: flex; align-items: center; padding: 8px 12px;
      border-radius: 8px; cursor: pointer; transition: background 0.15s; gap: 8px;
    }
    .music-list-item:hover { background: rgba(233, 30, 99, 0.06); }
    .music-list-item.selected { background: rgba(233, 30, 99, 0.1); }
    .music-list-item .music-item-name { flex: 1; font-size: 13px; color: #333; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .music-list-item .music-item-size { font-size: 11px; color: #999; }

    /* 章节音乐选择 */
    .chapter-music-row { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
    .chapter-music-row select {
      flex: 1; padding: 6px 10px; border-radius: 8px;
      border: 1.5px solid rgba(233,30,99,0.2); font-size: 13px;
      color: #C2185B; outline: none;
    }
    .chapter-music-row button {
      padding: 6px 14px; border-radius: 8px; border: none;
      background: linear-gradient(135deg, #E91E63, #FF6090);
      color: white; font-size: 12px; cursor: pointer;
    }
  </style>
</head>
<body>
  <!-- 用户选择界面（第一次打开时显示） -->
  <div id="user-select-screen" style="position:fixed; top:0; left:0; right:0; bottom:0; z-index:9999; background:linear-gradient(135deg, #FFE4EC 0%, #FFB6C1 30%, #E91E63 100%); display:flex; align-items:center; justify-content:center; flex-direction:column;">
    <!-- 设置按钮（右上角） -->
    <a href="/admin" target="_blank" style="position:absolute; top:20px; right:20px; padding:10px 18px; border-radius:12px; background:rgba(255,255,255,0.25); backdrop-filter:blur(10px); color:#C2185B; text-decoration:none; font-size:15px; font-weight:600; display:flex; align-items:center; gap:8px; transition:all 0.2s; box-shadow:0 2px 8px rgba(0,0,0,0.1);" onmouseover="this.style.background='rgba(255,255,255,0.4)'" onmouseout="this.style.background='rgba(255,255,255,0.25)'">
      <i class="fa fa-cog"></i>设置
    </a>
    <div style="text-align:center; margin-bottom:32px;">
      <i class="fa fa-heart" style="font-size:36px; color:#E91E63; margin-bottom:12px; display:block;"></i>
      <h2 style="font-size:28px; color:#C2185B; font-weight:700; margin-bottom:8px;">时光印记</h2>
      <p style="font-size:14px; color:#999;">请选择你的身份，开始回忆之旅</p>
    </div>
    <div id="shell-user-list" style="display:flex; flex-wrap:wrap; gap:12px; justify-content:center; max-width:400px; margin-bottom:24px;"></div>
    <button onclick="showCreateUserInShell()" style="padding:10px 24px; border-radius:12px; border:1.5px dashed rgba(233,30,99,0.3); background:transparent; color:#E91E63; font-size:14px; cursor:pointer; transition:all 0.2s;">
      <i class="fa fa-user-plus" style="margin-right:6px;"></i>新建用户
    </button>
  </div>

  <!-- 内容 iframe -->
  <iframe id="content-frame" src="/home" allow="autoplay"></iframe>

  <!-- 音乐播放器（永不刷新） -->
  <audio id="bgm-audio" preload="auto"></audio>
  <div id="music-player" class="music-player">
    <button class="music-icon" onclick="toggleMusicPlayer()" title="展开/收起"><i class="fa fa-music"></i></button>
    <div class="music-info">
      <div class="music-name" id="music-name">未播放</div>
      <div class="music-progress-wrap" id="music-progress-wrap">
        <div class="music-progress-bar" id="music-progress-bar"></div>
        <div class="music-progress-handle" id="music-progress-handle"></div>
      </div>
      <div class="music-time"><span id="music-time-current">0:00</span> / <span id="music-time-total">0:00</span></div>
    </div>
    <div class="music-controls">
      <button class="music-btn" onclick="playPrevMusic()" title="上一首"><i class="fa fa-step-backward"></i></button>
      <button class="music-btn play-btn" onclick="togglePlayPause()" id="music-play-btn" title="播放/暂停"><i class="fa fa-play"></i></button>
      <button class="music-btn" onclick="playNextMusic()" title="下一首（随机）"><i class="fa fa-step-forward"></i></button>
      <input type="range" class="music-volume" id="music-volume" min="0" max="100" value="50" oninput="changeMusicVolume(this.value)" title="音量">
      <button class="music-btn" onclick="showMusicSettings()" title="音乐设置"><i class="fa fa-cog"></i></button>
      <button class="music-close-btn" onclick="closeMusicPlayer()" title="关闭播放器"><i class="fa fa-times"></i></button>
    </div>
  </div>

  <!-- 新建用户弹窗 -->
  <div id="modal-create-user-shell" class="modal-overlay" onclick="if(event.target===this)closeCreateUserModal()">
    <div class="modal-box" style="max-width:360px;">
      <h3><i class="fa fa-user-plus" style="color: #E91E63; margin-right: 6px;"></i>新建用户</h3>
      <label>用户名</label>
      <input type="text" id="shell-create-user-name" placeholder="输入用户名" maxlength="20" style="width:100%; padding:10px 14px; border:1.5px solid rgba(233,30,99,0.2); border-radius:8px; font-size:14px; box-sizing:border-box; margin-bottom:12px;" onkeydown="if(event.key==='Enter')confirmCreateUserInShell()">
      <div class="modal-actions">
        <button onclick="closeCreateUserModal()" class="modal-btn modal-btn-cancel">取消</button>
        <button onclick="confirmCreateUserInShell()" class="modal-btn modal-btn-confirm">创建</button>
      </div>
    </div>
  </div>

  <!-- 删除用户确认弹窗 -->
  <div id="modal-delete-user-shell" class="modal-overlay" onclick="if(event.target===this)closeDeleteUserModal()">
    <div class="modal-box" style="max-width:400px;">
      <h3><i class="fa fa-exclamation-triangle" style="color: #dc2626; margin-right: 6px;"></i>删除用户确认</h3>
      <p style="font-size:14px; color:#555; margin-bottom:8px;">确定要删除用户 "<span id="shell-delete-user-name" style="font-weight:600; color:#C2185B;"></span>" 吗？</p>
      <p class="modal-hint" style="color:#dc2626; margin-top:12px;">删除后将清除该用户的观看记录和音乐设置，此操作不可恢复！</p>
      <input type="hidden" id="shell-delete-user-id">
      <div class="modal-actions">
        <button onclick="closeDeleteUserModal()" class="modal-btn modal-btn-cancel">取消</button>
        <button onclick="executeDeleteUser()" class="modal-btn modal-btn-confirm" style="background:linear-gradient(135deg, #dc2626, #ef4444);">确认删除</button>
      </div>
    </div>
  </div>

  <!-- 音乐设置弹窗 -->
  <div id="modal-music-settings" class="modal-overlay" onclick="if(event.target===this)closeModals()">
    <div class="modal-box" style="max-width:480px;">
      <h3><i class="fa fa-music" style="color: #E91E63; margin-right: 6px;"></i>音乐设置</h3>
      <label>切换章节时自动换歌</label>
      <div style="display:flex; align-items:center; gap:10px; margin-bottom:10px;">
        <label style="display:flex; align-items:center; cursor:pointer; font-size:13px; color:#555;">
          <input type="checkbox" id="music-auto-switch" onchange="saveMusicSettings()" checked style="margin-right:6px; accent-color:#E91E63;">
          自动切换
        </label>
        <span style="font-size:11px; color:#aaa;">开启后，进入或切换章节时自动更换背景音乐</span>
      </div>
      <label>进入页面自动播放</label>
      <div style="display:flex; align-items:center; gap:10px; margin-bottom:14px;">
        <label style="display:flex; align-items:center; cursor:pointer; font-size:13px; color:#555;">
          <input type="checkbox" id="music-auto-play" onchange="saveMusicSettings()" checked style="margin-right:6px; accent-color:#E91E63;">
          自动播放
        </label>
        <span style="font-size:11px; color:#aaa;">开启后，进入页面自动开始播放音乐</span>
      </div>
      <label>为章节指定专属音乐</label>
      <div style="margin-bottom:10px;">
        <select id="chapter-select-for-music" onchange="onChapterSelectForMusicChange()" style="width:100%; padding:8px 12px; border:1.5px solid rgba(233,30,99,0.2); border-radius:8px; font-size:13px; margin-bottom:8px; color:#333;">
          <option value="home">首页</option>
          <option value="login">用户选择页</option>
        </select>
        <div class="chapter-music-row">
          <select id="chapter-music-select"><option value="">随机播放</option></select>
          <button onclick="saveChapterMusic()">保存</button>
        </div>
        <span id="chapter-music-status" style="font-size:11px; color:#aaa;"></span>
      </div>
      <label>可用音乐列表</label>
      <div class="music-settings-content" id="music-list-container" style="border:1.5px solid rgba(233,30,99,0.15); border-radius:10px; max-height:200px; overflow-y:auto; margin-bottom:6px;">
        <div style="padding:20px; text-align:center; color:#bbb; font-size:13px;">加载中...</div>
      </div>
      <p class="modal-hint">将音乐文件放入 <span id="music-dir-hint" style="color:#C2185B;">K:\Pictures\音乐</span> 文件夹即可使用</p>
      <div class="modal-actions">
        <button onclick="closeModals()" class="modal-btn modal-btn-cancel">关闭</button>
        <button onclick="loadMusicList()" class="modal-btn modal-btn-confirm">刷新列表</button>
      </div>
    </div>
  </div>

<script>
/* ========== Shell 音乐播放器系统 ========== */
var allMusicList = [];
var currentMusicName = '';
var currentMusicIndex = -1;
var isMusicPlaying = false;
var musicErrorCount = 0;
var musicErrorTimer = null;
var musicPlayLock = false;
var autoSwitch = true;
var autoPlay = true;
var currentChapter = '';
var currentUserId = null;

// 尝试从 localStorage 恢复 currentUserId（页面刷新后保持登录状态）
try {
  var savedUserId = localStorage.getItem('timeImprint_currentUserId');
  if (savedUserId) {
    currentUserId = savedUserId;
  }
} catch(e) {}

var bgmAudio = document.getElementById('bgm-audio');
var contentFrame = document.getElementById('content-frame');

bgmAudio.addEventListener('ended', function() {
  console.log('[shell] 歌曲播放完毕! 当前索引:', currentMusicIndex, 'loop:', bgmAudio.loop);
  musicErrorCount = 0;
  playNextMusic();
});
bgmAudio.addEventListener('error', function() {
  var code = bgmAudio.error ? bgmAudio.error.code : 0;
  console.warn('音乐加载失败:', currentMusicName || bgmAudio.src, 'code=' + code);
  isMusicPlaying = false;
  musicErrorCount++;
  if (musicErrorCount > 5) {
    bgmAudio.removeAttribute('src');
    bgmAudio.load();
    currentMusicName = '';
    updateMusicUI();
    return;
  }
  if (currentMusicName && code === 4) {
    allMusicList = allMusicList.filter(function(m) { return m.name !== currentMusicName; });
    currentMusicName = '';
    currentMusicIndex = -1;
  }
  updateMusicUI();
  renderMusicList();
  clearTimeout(musicErrorTimer);
  musicErrorTimer = setTimeout(function() {
    if (allMusicList.length > 0) playNextMusic();
  }, 500);
});
bgmAudio.addEventListener('timeupdate', updateProgress);
bgmAudio.addEventListener('loadedmetadata', function() {
  document.getElementById('music-time-total').textContent = formatTime(bgmAudio.duration);
});

var progressDragging = false;
var progressWrap = document.getElementById('music-progress-wrap');
progressWrap.addEventListener('mousedown', function(e) {
  progressDragging = true;
  progressWrap.classList.add('dragging');
  seekToPosition(e);
});
document.addEventListener('mousemove', function(e) {
  if (progressDragging) seekToPosition(e);
});
document.addEventListener('mouseup', function() {
  if (progressDragging) {
    progressDragging = false;
    progressWrap.classList.remove('dragging');
  }
});
progressWrap.addEventListener('touchstart', function(e) {
  progressDragging = true;
  progressWrap.classList.add('dragging');
  seekToPosition(e.touches[0]);
}, { passive: true });
document.addEventListener('touchmove', function(e) {
  if (progressDragging) seekToPosition(e.touches[0]);
}, { passive: true });
document.addEventListener('touchend', function() {
  if (progressDragging) {
    progressDragging = false;
    progressWrap.classList.remove('dragging');
  }
});

function seekToPosition(e) {
  var rect = progressWrap.getBoundingClientRect();
  var x = e.clientX - rect.left;
  var ratio = Math.max(0, Math.min(1, x / rect.width));
  if (bgmAudio.duration && isFinite(bgmAudio.duration)) {
    bgmAudio.currentTime = ratio * bgmAudio.duration;
  }
  updateProgressBar(ratio);
}

function updateProgress() {
  if (progressDragging) return;
  if (bgmAudio.duration && isFinite(bgmAudio.duration)) {
    var ratio = bgmAudio.currentTime / bgmAudio.duration;
    updateProgressBar(ratio);
    document.getElementById('music-time-current').textContent = formatTime(bgmAudio.currentTime);
  }
}

function updateProgressBar(ratio) {
  var pct = (ratio * 100).toFixed(2) + '%';
  document.getElementById('music-progress-bar').style.width = pct;
  document.getElementById('music-progress-handle').style.left = pct;
}

function formatTime(sec) {
  if (!sec || !isFinite(sec)) return '0:00';
  var m = Math.floor(sec / 60);
  var s = Math.floor(sec % 60);
  return m + ':' + (s < 10 ? '0' : '') + s;
}

async function loadMusicList() {
  try {
    console.log('[shell] loadMusicList 开始加载...');
    var res = await fetch('/api/music/list');
    var data = await res.json();
    console.log('[shell] loadMusicList 数据:', data);
    if (data.ok) {
      allMusicList = data.musics;
      console.log('[shell] loadMusicList 音乐数量:', allMusicList.length);
      renderMusicList();
      renderChapterMusicSelect();
      document.getElementById('music-dir-hint').textContent = data.music_dir || 'K:\\Pictures\\音乐';
    }
  } catch (e) { console.error('[shell] loadMusicList 失败:', e); }
}

function renderMusicList() {
  var container = document.getElementById('music-list-container');
  if (!allMusicList.length) {
    container.innerHTML = '<div style="padding:20px; text-align:center; color:#bbb; font-size:13px;"><i class="fa fa-music" style="display:block; font-size:24px; margin-bottom:6px; opacity:0.4;"></i>暂无音乐文件<br><span style="font-size:11px;">请将音频文件放入音乐文件夹</span></div>';
    return;
  }
  container.innerHTML = allMusicList.map(function(m) {
    return '<div class="music-list-item' + (m.name === currentMusicName ? ' selected' : '') + '" onclick="playSpecificMusic(\'' + m.name + '\')">' +
      '<i class="fa fa-music" style="color:#E91E63; font-size:12px; width:16px; text-align:center;"></i>' +
      '<span class="music-item-name">' + m.name + '</span>' +
      '<span class="music-item-size">' + m.size_display + '</span>' +
      (m.name === currentMusicName ? '<i class="fa fa-volume-up" style="color:#E91E63; font-size:11px;"></i>' : '') +
    '</div>';
  }).join('');
}

function renderChapterMusicSelect() {
  console.log('[renderChapterMusicSelect] 开始渲染');
  // 不直接填充，而是调用 onChapterSelectForMusicChange 来根据当前选中章节加载
  onChapterSelectForMusicChange();
}

function playSpecificMusic(name, shouldPlay) {
  if (!name) return;
  if (shouldPlay === undefined) shouldPlay = true;
  if (currentMusicName === name && shouldPlay) {
    if (bgmAudio.paused) {
      bgmAudio.play().catch(function(){});
      isMusicPlaying = true;
      updateMusicUI();
    }
    return;
  }
  if (musicPlayLock) { bgmAudio.pause(); }
  musicPlayLock = true;
  currentMusicName = name;
  currentMusicIndex = allMusicList.findIndex(function(m) { return m.name === name; });
  bgmAudio.src = '/api/music/serve?f=' + encodeURIComponent(name);
  bgmAudio.volume = parseInt(document.getElementById('music-volume').value) / 100;
  showMusicPlayer();
  renderMusicList();
  if (!shouldPlay) {
    musicPlayLock = false;
    isMusicPlaying = false;
    updateMusicUI();
    return;
  }
  var playPromise = bgmAudio.play();
  if (playPromise !== undefined) {
    playPromise.then(function() {
      musicPlayLock = false;
      isMusicPlaying = true;
      musicErrorCount = 0;
      updateMusicUI();
      showMusicPlayer();
      renderMusicList();
    }).catch(function(e) {
      musicPlayLock = false;
      if (e.name === 'AbortError') return;
      if (e.name === 'NotAllowedError') {
        isMusicPlaying = false;
        updateMusicUI();
        return;
      }
      isMusicPlaying = false;
      updateMusicUI();
    });
  } else {
    musicPlayLock = false;
  }
}

function playRandomMusic(shouldPlay) {
  if (!allMusicList.length) return;
  var idx = Math.floor(Math.random() * allMusicList.length);
  playSpecificMusic(allMusicList[idx].name, shouldPlay);
}

function playPrevMusic() {
  if (!allMusicList.length) return;
  if (currentMusicIndex < 0 || currentMusicIndex >= allMusicList.length) {
    playRandomMusic();
    return;
  }
  currentMusicIndex = (currentMusicIndex - 1 + allMusicList.length) % allMusicList.length;
  playSpecificMusic(allMusicList[currentMusicIndex].name);
}

function playNextMusic() {
  console.log('[shell] playNextMusic 被调用, 当前索引:', currentMusicIndex, '列表长度:', allMusicList.length);
  if (!allMusicList.length) return;
  if (currentMusicIndex < 0 || currentMusicIndex >= allMusicList.length) {
    console.log('[shell] 索引无效，随机播放');
    playRandomMusic();
    return;
  }
  currentMusicIndex = (currentMusicIndex + 1) % allMusicList.length;
  console.log('[shell] 下一首索引:', currentMusicIndex, '歌曲名:', allMusicList[currentMusicIndex].name);
  playSpecificMusic(allMusicList[currentMusicIndex].name);
}

function togglePlayPause() {
  if (bgmAudio.error) {
    bgmAudio.removeAttribute('src');
    bgmAudio.load();
    currentMusicName = '';
    isMusicPlaying = false;
    musicErrorCount = 0;
    musicPlayLock = false;
    updateMusicUI();
    if (allMusicList.length > 0) { playNextMusic(); return; }
    return;
  }
  if (!bgmAudio.src && allMusicList.length > 0) { musicErrorCount = 0; playRandomMusic(); return; }
  if (isMusicPlaying || musicPlayLock) {
    bgmAudio.pause();
    isMusicPlaying = false;
    musicPlayLock = false;
    updateMusicUI();
  } else {
    musicErrorCount = 0;
    isMusicPlaying = true;
    updateMusicUI();
    bgmAudio.play().catch(function(e) {
      isMusicPlaying = false;
      musicPlayLock = false;
      updateMusicUI();
      if (e.name === 'AbortError') return;
      if (e.name === 'NotAllowedError') return;
    });
  }
}

function updateMusicUI() {
  var btn = document.getElementById('music-play-btn');
  btn.innerHTML = isMusicPlaying ? '<i class="fa fa-pause"></i>' : '<i class="fa fa-play"></i>';
  document.getElementById('music-name').textContent = currentMusicName || '未播放';
}

function changeMusicVolume(val) {
  bgmAudio.volume = val / 100;
  localStorage.setItem('musicVolume', val);
}

function showMusicPlayer() {
  document.getElementById('music-player').classList.remove('hidden', 'collapsed');
}
function closeMusicPlayer() {
  document.getElementById('music-player').classList.add('hidden');
  document.getElementById('music-player').classList.remove('collapsed');
}
function toggleMusicPlayer() {
  var player = document.getElementById('music-player');
  if (player.classList.contains('hidden')) { showMusicPlayer(); }
  else { closeMusicPlayer(); }
}

function closeModals() {
  document.getElementById('modal-music-settings').classList.remove('active');
}

async function showMusicSettings() {
  loadMusicList();
  try {
    var res = await fetch('/api/music/settings');
    var data = await res.json();
    if (data.ok) {
      autoSwitch = data.settings.auto_switch !== false;
      autoPlay = data.settings.auto_play !== false;
      document.getElementById('music-auto-switch').checked = autoSwitch;
      document.getElementById('music-auto-play').checked = autoPlay;
    }
  } catch (e) {}
  
  // 加载章节列表
  loadChaptersForMusicSelect();
  
  document.getElementById('modal-music-settings').classList.add('active');
}

async function loadChaptersForMusicSelect() {
  var chapterSelect = document.getElementById('chapter-select-for-music');
  try {
    var res = await fetch('/api/chapter');
    var data = await res.json();
    if (data.ok && data.chapters) {
      // 保留"首页"和"用户选择页"选项
      var existingOptions = '';
      if (chapterSelect.options.length > 0 && chapterSelect.options[0].value === 'home') {
        existingOptions = '<option value="home">首页</option><option value="login">用户选择页</option>';
      }
      // 添加章节列表
      var chapterOptions = data.chapters.map(function(ch) {
        var yearLabel = ch.year ? (ch.year + ' - ') : '';
        return '<option value="' + ch.name + '">' + yearLabel + ch.name + '</option>';
      }).join('');
      chapterSelect.innerHTML = existingOptions + chapterOptions;
      // 默认选中首页
      chapterSelect.value = 'home';
      // 加载首页的音乐设置
      onChapterSelectForMusicChange();
    }
  } catch (e) {}
}

async function onChapterSelectForMusicChange() {
  console.log('[onChapterSelectForMusicChange] 开始执行');
  var chapter = document.getElementById('chapter-select-for-music').value;
  console.log('[onChapterSelectForMusicChange] 选中章节:', chapter);
  var musicSelect = document.getElementById('chapter-music-select');
  var statusSpan = document.getElementById('chapter-music-status');
  
  console.log('[onChapterSelectForMusicChange] allMusicList 长度:', allMusicList.length);
  
  try {
    var res = await fetch('/api/chapter/music?chapter=' + encodeURIComponent(chapter));
    var data = await res.json();
    console.log('[onChapterSelectForMusicChange] API 返回:', data);
    
    // 始终填充所有音乐选项
    var currentMusic = (data.ok && data.music) ? data.music : '';
    var html = '<option value="">随机播放</option><option value="__none__">不播放音乐</option>' +
      allMusicList.map(function(m) {
        return '<option value="' + m.name + '"' + (m.name === currentMusic ? ' selected' : '') + '>' + m.name + '</option>';
      }).join('');
    
    musicSelect.innerHTML = html;
    
    // 如果当前音乐是 __none__，需要手动选中
    if (currentMusic === '__none__') {
      musicSelect.value = '__none__';
    }
    
    if (currentMusic === '__none__') {
      statusSpan.textContent = '已为该章节指定音乐';
      console.log('[onChapterSelectForMusicChange] 指定不播放音乐');
    } else if (currentMusic) {
      statusSpan.textContent = '已为该章节指定音乐';
      console.log('[onChapterSelectForMusicChange] 有专属音乐，填充完成');
    } else {
      statusSpan.textContent = '该章节使用随机播放';
      console.log('[onChapterSelectForMusicChange] 无专属音乐，但已填充所有选项');
    }
  } catch (e) {
    console.error('[onChapterSelectForMusicChange] 错误:', e);
    statusSpan.textContent = '加载失败';
  }
}

// 用户登录后加载用户专属音乐设置
async function loadUserMusicSettings() {
  try {
    var res = await fetch('/api/music/settings');
    var data = await res.json();
    if (data.ok) {
      autoSwitch = data.settings.auto_switch !== false;
      autoPlay = data.settings.auto_play !== false;
      document.getElementById('music-auto-switch').checked = autoSwitch;
      document.getElementById('music-auto-play').checked = autoPlay;
      // 显示音乐播放器
      showMusicPlayer();
      // 用户已登录，检查首页的音乐设置（而非用户选择页）
      if (autoSwitch && allMusicList.length > 0) {
        handleChapterChange('home');
      }
    }
  } catch (e) {
    console.error('加载用户音乐设置失败:', e);
  }
}

async function saveMusicSettings() {
  autoSwitch = document.getElementById('music-auto-switch').checked;
  autoPlay = document.getElementById('music-auto-play').checked;
  try {
    await fetch('/api/music/settings', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ settings: { auto_switch: autoSwitch, auto_play: autoPlay } })
    });
  } catch (e) {}
}

function saveChapterMusic() {
  var chapter = document.getElementById('chapter-select-for-music').value;
  var music = document.getElementById('chapter-music-select').value;
  var statusSpan = document.getElementById('chapter-music-status');
  
  // 如果选择了"不播放音乐"，保存特殊标记
  var musicToSave = (music === '__none__') ? '__none__' : (music || null);
  
  fetch('/api/chapter/music', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ chapter: chapter, music: musicToSave })
  }).then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.ok) {
        if (music === '__none__') {
          statusSpan.textContent = '已保存 ✓ 该章节不播放音乐';
          // 如果选择的是当前章节，则停止播放
          if (chapter === currentChapter) {
            bgmAudio.pause();
            isMusicPlaying = false;
            updateMusicUI();
          }
        } else if (music) {
          statusSpan.textContent = '已保存 ✓';
          // 如果选择的是当前章节且有音乐，则播放
          if (music && chapter === currentChapter) {
            playSpecificMusic(music, true);
          }
        } else {
          statusSpan.textContent = '已清除，将随机播放';
        }
      }
    }).catch(function(){
      statusSpan.textContent = '保存失败';
    });
}

/* ========== iframe 导航控制 ========== */
var pendingLastChapter = null;

function saveLastChapterFromIframe(chapter, scroll) {
  pendingLastChapter = { chapter: chapter, scroll: scroll };
  doSaveLastChapter();
}

function doSaveLastChapter() {
  if (!pendingLastChapter) return;
  var data = pendingLastChapter;
  pendingLastChapter = null;
  try {
    fetch('/api/user/last-chapter', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ chapter_name: data.chapter, scroll_position: data.scroll }),
      keepalive: true
    }).catch(function(){});
  } catch(e) {}
}

function navigateTo(url) {
  contentFrame.src = url;
}

// 监听 iframe 中页面的消息
window.addEventListener('message', function(e) {
  var msg = e.data;
  if (!msg || !msg.type) return;

  switch(msg.type) {
    case 'navigate':
      navigateTo(msg.url);
      break;
    case 'chapter-loaded':
      currentChapter = msg.chapter || '';
      handleChapterChange(currentChapter);
      break;
    case 'home-loaded':
      currentChapter = '';
      // 如果已有登录用户，按照首页音乐设置处理；否则按照用户选择页音乐设置处理
      if (currentUserId) {
        handleChapterChange('home');
      } else {
        handleChapterChange('login');
      }
      // 如果已有登录用户，重新发送登录消息
      if (currentUserId) {
        var frame = document.getElementById('content-frame');
        if (frame && frame.contentWindow) {
          frame.contentWindow.postMessage({ type: 'user-logged-in', user_id: currentUserId }, '*');
        }
      }
      break;
    case 'save-last-chapter':
      saveLastChapterFromIframe(msg.chapter, msg.scroll);
      break;
    case 'toggle-music':
      toggleMusicPlayer();
      break;
    case 'video-playing':
      if (msg.playing) {
        // 暂停音乐并隐藏整个播放器
        bgmAudio.pause();
        isMusicPlaying = false;
        updateMusicUI();
        var mp = document.getElementById('music-player');
        if (mp) mp.style.display = 'none';
      } else {
        // 恢复音乐并显示整个播放器
        bgmAudio.play().catch(function(){});
        isMusicPlaying = true;
        updateMusicUI();
        var mp = document.getElementById('music-player');
        if (mp) {
          mp.style.display = 'flex';
          mp.classList.remove('collapsed');
        }
      }
      break;
    case 'show-music-settings':
      showMusicSettings();
      break;
    case 'user-logged-in':
      // 用户登录后重新加载音乐设置
      loadUserMusicSettings();
      break;
    case 'show-user-select':
      showUserSelectScreen();
      break;
    case 'chapter-photo-rotated':
      // 章节中的图片被旋转，需要刷新首页该章节的封面缩略图
      if (msg.chapter) {
        var chapterName = msg.chapter;
        // 发送消息给iframe中的首页，让其刷新对应的章节封面缩略图
        var frame = document.getElementById('content-frame');
        if (frame && frame.contentWindow) {
          frame.contentWindow.postMessage({ type: 'refresh-chapter-thumb', chapter: chapterName }, '*');
        }
      }
      break;
    case 'music-cmd':
      switch(msg.cmd) {
        case 'play-specific': playSpecificMusic(msg.name, msg.shouldPlay); break;
        case 'play-random': playRandomMusic(msg.shouldPlay); break;
        case 'prev': playPrevMusic(); break;
        case 'next': playNextMusic(); break;
        case 'toggle-play': togglePlayPause(); break;
        case 'volume': changeMusicVolume(msg.value); break;
      }
      break;
    case 'fullscreen-entered':
      // 全屏模式，隐藏音乐播放器
      var mp = document.getElementById('music-player');
      if (mp) mp.style.display = 'none';
      break;
    case 'fullscreen-exited':
      // 退出全屏模式，恢复音乐播放器
      var mp = document.getElementById('music-player');
      if (mp) mp.style.display = 'flex';
      break;
  }
});

// 监听管理页面通过 localStorage 发送的封面刷新通知
window.addEventListener('storage', function(e) {
  if (e.key === '_time_imprint_refresh_cover') {
    try {
      var data = JSON.parse(e.newValue);
      if (data && data.chapter) {
        // 先清除 localStorage 中的旧数据
        localStorage.removeItem('_time_imprint_refresh_cover');
        // 转发给 iframe 中的首页刷新封面
        var frame = document.getElementById('content-frame');
        if (frame && frame.contentWindow) {
          frame.contentWindow.postMessage({ type: 'refresh-chapter-thumb', chapter: data.chapter }, '*');
        }
      }
    } catch(err) {}
  }
});

// 章节切换时的音乐处理
function handleChapterChange(chapter) {
  // auto_switch 关闭：不做任何操作，继续播放原有音乐
  if (!autoSwitch || !allMusicList.length) return;
  
  // 首页使用 'home' 作为key，用户选择页使用 'login' 作为key，其他章节用原名
  var chapterKey = chapter || '';
  if (chapterKey === '' || chapterKey === 'home') chapterKey = 'home';
  
  fetch('/api/chapter/music?chapter=' + encodeURIComponent(chapterKey))
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.ok && data.music) {
        // 章节有专属歌曲
        if (data.music === '__none__') {
          // 章节指定不播放音乐，停止播放
          bgmAudio.pause();
          isMusicPlaying = false;
          currentMusicName = null;
          updateMusicUI();
          console.log('[handleChapterChange] 章节指定不播放音乐，已停止');
        } else if (currentMusicName !== data.music) {
          // auto_play 开启：播放专属歌曲；auto_play 关闭：切到专属歌曲并暂停
          playSpecificMusic(data.music, autoPlay);
        }
      } else {
        // 章节无专属歌曲
        // auto_play 开启：切换下一首并开始播放；auto_play 关闭：切换下一首并暂停
        playRandomMusic(autoPlay);
      }
    }).catch(function() {
      // 出错时按照 auto_play 设置决定是否播放
      playRandomMusic(autoPlay);
    });
}

/* ========== 初始化 ========== */
var userHasSelected = false;

async function loadShellUserList() {
  try {
    var res = await fetch('/api/user/list');
    var data = await res.json();
    var container = document.getElementById('shell-user-list');
    if (data.ok && data.users.length > 0) {
      container.innerHTML = data.users.map(function(u) {
        return '<div style="position:relative; display:inline-block;" onmouseover="this.querySelector(\'.delete-btn\').style.opacity=\'1\'" onmouseout="this.querySelector(\'.delete-btn\').style.opacity=\'0\'">' +
          '<div onclick="selectUserInShell(\'' + u.id + '\', \'' + u.name.replace(/'/g, "\\'") + '\')" style="padding:14px 28px; border-radius:14px; border:1.5px solid rgba(233,30,99,0.2); background:rgba(255,255,255,0.9); cursor:pointer; transition:all 0.2s; text-align:center; min-width:100px;" onmouseover="this.style.borderColor=\'#E91E63\';this.style.background=\'rgba(233,30,99,0.06)\'" onmouseout="this.style.borderColor=\'rgba(233,30,99,0.2)\';this.style.background=\'rgba(255,255,255,0.9)\'">' +
          '<i class="fa fa-user" style="font-size:20px; color:#E91E63; display:block; margin-bottom:6px;"></i>' +
          '<span style="font-size:14px; color:#C2185B; font-weight:600;">' + u.name + '</span>' +
          '</div>' +
          '<button onclick="event.stopPropagation(); confirmDeleteUserInShell(\'' + u.id + '\', \'' + u.name.replace(/'/g, "\\'") + '\')" class="delete-btn" style="position:absolute; top:-8px; right:-8px; width:24px; height:24px; border-radius:50%; border:1.5px solid #dc2626; background:#fee2e2; color:#dc2626; cursor:pointer; font-size:12px; opacity:0; transition:all 0.2s; display:flex; align-items:center; justify-content:center;" title="删除用户"><i class="fa fa-times"></i></button>' +
          '</div>';
      }).join('');
    } else {
      container.innerHTML = '';
    }
  } catch(e) {}
}

async function selectUserInShell(userId, userName) {
  try {
    var res = await fetch('/api/user/select', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ user_id: userId })
    });
    var data = await res.json();
    if (data.ok) {
      // 隐藏用户选择界面
      document.getElementById('user-select-screen').style.display = 'none';
      userHasSelected = true;
      // 保存当前用户 ID
      currentUserId = userId;
      // 持久化到 localStorage（页面刷新后保持登录状态）
      try { localStorage.setItem('timeImprint_currentUserId', userId); } catch(e) {}
      // 显示音乐播放器
      showMusicPlayer();
      // 加载用户音乐设置
      loadUserMusicSettings();
      // 通知 iframe 用户已登录
      var frame = document.getElementById('content-frame');
      if (frame && frame.contentWindow) {
        frame.contentWindow.postMessage({ type: 'user-logged-in', user_id: userId }, '*');
      }
    }
  } catch(e) {}
}

function showUserSelectScreen() {
  document.getElementById('user-select-screen').style.display = 'flex';
  loadShellUserList();
}

function showCreateUserInShell() {
  document.getElementById('modal-create-user-shell').classList.add('active');
  document.getElementById('shell-create-user-name').value = '';
  document.getElementById('shell-create-user-name').focus();
}

function closeCreateUserModal() {
  document.getElementById('modal-create-user-shell').classList.remove('active');
}

function confirmCreateUserInShell() {
  var nameInput = document.getElementById('shell-create-user-name');
  var name = nameInput.value.trim();
  if (!name) return;
  closeCreateUserModal();
  fetch('/api/user/create', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ name: name })
  })
  .then(function(res) { return res.json(); })
  .then(function(data) {
    if (data.ok) {
      selectUserInShell(data.user_id, data.name);
      loadShellUserList();
    } else {
      alert('创建失败：' + (data.error || '未知错误'));
    }
  })
  .catch(function() {
    alert('网络错误，创建失败');
  });
}

function confirmDeleteUserInShell(userId, userName) {
  document.getElementById('shell-delete-user-id').value = userId;
  document.getElementById('shell-delete-user-name').textContent = userName;
  document.getElementById('modal-delete-user-shell').classList.add('active');
}

function closeDeleteUserModal() {
  document.getElementById('modal-delete-user-shell').classList.remove('active');
}

function executeDeleteUser() {
  var userId = document.getElementById('shell-delete-user-id').value;
  closeDeleteUserModal();
  fetch('/api/user/delete', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ user_id: userId })
  })
  .then(function(res) { return res.json(); })
  .then(function(data) {
    if (data.ok) {
      if (currentUserId === userId) {
        currentUserId = null;
        document.getElementById('user-select-screen').style.display = 'flex';
      }
      loadShellUserList();
    } else {
      alert('删除失败：' + (data.error || '未知错误'));
    }
  })
  .catch(function() {
    alert('网络错误，删除失败');
  });
}

async function init() {
  var savedVolume = localStorage.getItem('musicVolume');
  if (savedVolume) {
    document.getElementById('music-volume').value = savedVolume;
    bgmAudio.volume = savedVolume / 100;
  } else {
    bgmAudio.volume = 0.5;
  }
  await loadMusicList();
  // 默认隐藏音乐播放器，等用户登录后再显示
  document.getElementById('music-player').classList.add('hidden');
  updateMusicUI();
  if (allMusicList.length === 0) return;

  try {
    var res = await fetch('/api/music/settings');
    var data = await res.json();
    autoPlay = data.ok && data.settings.auto_play !== false;
    autoSwitch = data.ok && data.settings.auto_switch !== false;
    if (data.ok) {
      document.getElementById('music-auto-switch').checked = autoSwitch;
      document.getElementById('music-auto-play').checked = autoPlay;
    }
  } catch(e) {}

  // 加载用户列表
  loadShellUserList();

  // 初始化时使用用户选择页的音乐设置（因为页面初始显示的是用户选择页，不是首页）
  if (autoSwitch && allMusicList.length > 0) {
    handleChapterChange('login');
  } else if (autoPlay) {
    playRandomMusic(true);
  }
}

init();
