<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>音乐播放器</title>
<link rel="stylesheet" href="/static/font-awesome/css/font-awesome.min.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: transparent; font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; }
  body { display: flex; align-items: center; justify-content: center; }

  .music-volume {
    width: 50px; height: 4px; appearance: none; -webkit-appearance: none;
    background: rgba(233,30,99,0.15); border-radius: 2px; outline: none; cursor: pointer;
  }
  .music-volume::-webkit-slider-thumb {
    appearance: none; -webkit-appearance: none;
    width: 12px; height: 12px; border-radius: 50%; background: #E91E63; cursor: pointer;
  }
</style>
</head>
<body>

<audio id="bgm-audio" preload="auto"></audio>
<input type="range" class="music-volume" id="music-volume" min="0" max="100" value="50"
       oninput="handleVolumeChange(this.value)" style="position:fixed;left:-9999px;">

<script>
var channel = new BroadcastChannel('bgm_control');
var allMusicList = [];
var currentMusicName = '';
var isMusicPlaying = false;
var musicErrorCount = 0;
var musicErrorTimer = null;
var musicPlayLock = false;
var autoSwitch = true;
var autoPlay = true;
var currentChapter = '';
var initialized = false;

const bgmAudio = document.getElementById('bgm-audio');

function sendToMain(msg) {
  try { channel.postMessage(msg); } catch(e) {}
}

function saveState() {
  try {
    localStorage.setItem('bgm_state', JSON.stringify({
      name: currentMusicName,
      src: bgmAudio.src,
      time: bgmAudio.currentTime,
      playing: !bgmAudio.paused && !!bgmAudio.src,
      volume: bgmAudio.volume,
      ts: Date.now()
    }));
  } catch(e) {}
}

// 每 2 秒保存一次状态，确保重载后能恢复
setInterval(saveState, 2000);

window.addEventListener('beforeunload', saveState);
document.addEventListener('visibilitychange', function() {
  if (document.visibilityState === 'hidden') saveState();
});

bgmAudio.addEventListener('ended', function() {
  musicErrorCount = 0;
  if (!bgmAudio.loop) playNextMusic();
});
bgmAudio.addEventListener('error', function() {
  var code = bgmAudio.error ? bgmAudio.error.code : 0;
  console.warn('[BGM] 加载失败:', currentMusicName || bgmAudio.src, 'code=' + code);
  isMusicPlaying = false;
  musicErrorCount++;
  sendToMain({ type: 'state-update', playing: false, name: currentMusicName, volume: Math.round(bgmAudio.volume * 100) });
  if (musicErrorCount > 5) {
    bgmAudio.removeAttribute('src');
    bgmAudio.load();
    currentMusicName = '';
    return;
  }
  if (currentMusicName && code === 4) {
    allMusicList = allMusicList.filter(function(m) { return m.name !== currentMusicName; });
    currentMusicName = '';
  }
  clearTimeout(musicErrorTimer);
  musicErrorTimer = setTimeout(function() {
    if (allMusicList.length > 0) playNextMusic();
  }, 500);
});

function loadMusicList() {
  return fetch('/api/music/list').then(function(r) { return r.json(); }).then(function(data) {
    if (data.ok) {
      allMusicList = data.musics || [];
      sendToMain({ type: 'list-update', list: allMusicList.map(function(m) { return { name: m.name, size_display: m.size_display }; }) });
      renderMusicList();
    }
    return data;
  }).catch(function(e) { console.error('[BGM] 加载列表失败:', e); return { ok: false }; });
}

function renderMusicList() {
  var html = allMusicList.map(function(m) {
    return '<div style="padding:6px 10px;cursor:pointer;border-radius:6px;font-size:12px;color:#333;' +
      (m.name === currentMusicName ? 'background:rgba(233,30,99,0.1);' : '') + '" ' +
      'onclick="playSpecificMusic(\'' + m.name.replace(/'/g, "\\'") + '\',true)">' +
      '<span style="flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">' + m.name + '</span>' +
      '<span style="font-size:11px;color:#999;margin-left:8px;">' + (m.size_display || '') + '</span>' +
      (m.name === currentMusicName ? ' <i class="fa fa-volume-up" style="color:#E91E63;font-size:11px;"></i>' : '') +
      '</div>';
  }).join('');
  sendToMain({ type: 'list-rendered', html: html });
}

function handleVolumeChange(val) {
  bgmAudio.volume = val / 100;
  try { localStorage.setItem('musicVolume', val); } catch(e) {}
}

function changeVolume(val) {
  document.getElementById('music-volume').value = val;
  handleVolumeChange(val);
}

function showPlayer() { sendToMain({ type: 'show-player' }); }
function hidePlayer() { sendToMain({ type: 'hide-player' }); }

function playSpecificMusic(name, shouldPlay) {
  if (!name) return;
  if (shouldPlay === undefined) shouldPlay = true;
  if (currentMusicName === name && shouldPlay) {
    if (bgmAudio.paused) {
      bgmAudio.play().catch(function(){});
      isMusicPlaying = true;
      sendToMain({ type: 'state-update', playing: true, name: name, volume: Math.round(bgmAudio.volume * 100) });
    }
    return;
  }
  if (musicPlayLock) { bgmAudio.pause(); }
  musicPlayLock = true;
  currentMusicName = name;
  bgmAudio.src = '/api/music/serve?f=' + encodeURIComponent(name);
  bgmAudio.volume = parseInt(document.getElementById('music-volume').value) / 100;
  showPlayer();
  renderMusicList();
  if (!shouldPlay) {
    musicPlayLock = false;
    isMusicPlaying = false;
    sendToMain({ type: 'state-update', playing: false, name: name, volume: Math.round(bgmAudio.volume * 100) });
    return;
  }
  var p = bgmAudio.play();
  if (p !== undefined) {
    p.then(function() {
      musicPlayLock = false;
      isMusicPlaying = true;
      musicErrorCount = 0;
      sendToMain({ type: 'state-update', playing: true, name: name, volume: Math.round(bgmAudio.volume * 100) });
    }).catch(function(e) {
      musicPlayLock = false;
      if (e.name === 'AbortError') return;
      if (e.name === 'NotAllowedError') {
        isMusicPlaying = false;
        sendToMain({ type: 'state-update', playing: false, name: name, volume: Math.round(bgmAudio.volume * 100) });
        return;
      }
      isMusicPlaying = false;
      sendToMain({ type: 'state-update', playing: false, name: name, volume: Math.round(bgmAudio.volume * 100) });
    });
  } else {
    musicPlayLock = false;
  }
}

function playRandomMusic(shouldPlay) {
  if (!allMusicList.length) return;
  var idx = Math.floor(Math.random() * allMusicList.length);
  playSpecificMusic(allMusicList[idx].name, shouldPlay);
}
function playPrevMusic() { playRandomMusic(true); }
function playNextMusic() { playRandomMusic(true); }

function togglePlayPause() {
  if (bgmAudio.error) {
    bgmAudio.removeAttribute('src');
    bgmAudio.load();
    currentMusicName = '';
    isMusicPlaying = false;
    musicErrorCount = 0;
    musicPlayLock = false;
    sendToMain({ type: 'state-update', playing: false, name: '', volume: 50 });
    if (allMusicList.length > 0) { playNextMusic(); return; }
    return;
  }
  if (!bgmAudio.src && allMusicList.length > 0) { musicErrorCount = 0; playRandomMusic(true); return; }
  if (isMusicPlaying || musicPlayLock) {
    bgmAudio.pause();
    isMusicPlaying = false;
    musicPlayLock = false;
  } else {
    musicErrorCount = 0;
    isMusicPlaying = true;
    bgmAudio.play().catch(function(e) {
      isMusicPlaying = false;
      musicPlayLock = false;
      if (e.name === 'AbortError') return;
      if (e.name === 'NotAllowedError') return;
    });
  }
  sendToMain({ type: 'state-update', playing: isMusicPlaying, name: currentMusicName, volume: Math.round(bgmAudio.volume * 100) });
}

function loadSettings() {
  return fetch('/api/music/settings').then(function(r) { return r.json(); }).then(function(data) {
    if (data.ok) {
      autoSwitch = data.settings.auto_switch !== false;
      autoPlay = data.settings.auto_play !== false;
      sendToMain({ type: 'settings-update', autoPlay: autoPlay, autoSwitch: autoSwitch });
    }
    return data;
  }).catch(function() { return { ok: false }; });
}

function saveSettings(settingsData) {
  if (settingsData) {
    autoSwitch = settingsData.autoSwitch !== false;
    autoPlay = settingsData.autoPlay !== false;
  }
  fetch('/api/music/settings', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ settings: { auto_switch: autoSwitch, auto_play: autoPlay } })
  }).catch(function(){});
}

function getChapterMusic(chapter) {
  return fetch('/api/chapter/music?chapter=' + encodeURIComponent(chapter)).then(function(r) { return r.json(); }).catch(function() { return { ok: false }; });
}

function saveChapterMusic(chapter, music) {
  fetch('/api/chapter/music', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ chapter: chapter, music: music })
  }).catch(function(){});
}

async function initForChapter(chapter) {
  currentChapter = chapter || '';
  var savedVolume = localStorage.getItem('musicVolume');
  if (savedVolume && Math.abs(bgmAudio.volume - savedVolume / 100) > 0.01) {
    document.getElementById('music-volume').value = savedVolume;
    bgmAudio.volume = savedVolume / 100;
  } else if (!savedVolume) {
    document.getElementById('music-volume').value = 50;
    bgmAudio.volume = 0.5;
  }

  if (!initialized) {
    initialized = true;
    var raw = localStorage.getItem('bgm_state');
    if (raw) {
      try {
        var saved = JSON.parse(raw);
        if (saved && saved.src && Date.now() - saved.ts < 3600000) {
          currentMusicName = saved.name;
          bgmAudio.src = saved.src;
          bgmAudio.volume = saved.volume || 0.5;
          bgmAudio.addEventListener('canplay', function onInitCanPlay() {
            bgmAudio.removeEventListener('canplay', onInitCanPlay);
            try { bgmAudio.currentTime = saved.time || 0; } catch(e) {}
            if (saved.playing) {
              var p = bgmAudio.play();
              if (p) p.then(function() {
                isMusicPlaying = true;
                sendToMain({ type: 'state-update', playing: true, name: currentMusicName, volume: Math.round(bgmAudio.volume * 100) });
              }).catch(function() {
                console.warn('[BGM] autoplay blocked');
              });
            } else {
              isMusicPlaying = false;
              sendToMain({ type: 'state-update', playing: false, name: currentMusicName, volume: Math.round(bgmAudio.volume * 100) });
            }
          });
          showPlayer();
          sendToMain({ type: 'init-done', hasMusic: true });
          return;
        }
      } catch(e) {}
    }

    Promise.all([loadMusicList(), loadSettings()]).then(function() {
      if (allMusicList.length === 0) { sendToMain({ type: 'init-done', hasMusic: false }); return; }
      renderMusicList();

      getChapterMusic(currentChapter).then(function(chapterRes) {
        var hasChapterMusic = chapterRes.ok && chapterRes.music;
        sendToMain({ type: 'chapter-music-data', music: hasChapterMusic ? chapterRes.music : '' });

        if (hasChapterMusic) {
          if (currentMusicName !== chapterRes.music) { playSpecificMusic(chapterRes.music, autoPlay); }
          return;
        }

        if (!autoSwitch) {
          if (!bgmAudio.src) {
            if (autoPlay) playRandomMusic(true);
          }
          return;
        }

        if (!bgmAudio.src) playRandomMusic(autoPlay);
      }).catch(function(){ if (!bgmAudio.src && allMusicList.length > 0) playRandomMusic(true); });
    }).catch(function(e) { console.error('[BGM] init error:', e); });
  }

  showPlayer();
  sendToMain({ type: 'init-done', hasMusic: true });
}

channel.addEventListener('message', function(e) {
  var msg = e.data;
  if (!msg || !msg.type) return;

  switch(msg.type) {
    case 'init':
      initForChapter(msg.chapter || '');
      break;
    case 'ping':
      sendToMain({ type: 'player-ready' });
      break;
    case 'toggle-play':
      togglePlayPause();
      break;
    case 'play-specific':
      playSpecificMusic(msg.name, msg.shouldPlay);
      break;
    case 'play-random':
      playRandomMusic(msg.shouldPlay);
      break;
    case 'next':
      playNextMusic();
      break;
    case 'prev':
      playPrevMusic();
      break;
    case 'volume':
      changeVolume(msg.value);
      break;
    case 'get-state':
      sendToMain({
        type: 'state-update',
        playing: isMusicPlaying,
        name: currentMusicName,
        volume: Math.round(bgmAudio.volume * 100),
        currentTime: bgmAudio.currentTime,
        duration: bgmAudio.duration || 0
      });
      break;
    case 'get-list':
      renderMusicList();
      sendToMain({ type: 'list-update', list: allMusicList });
      break;
    case 'save-settings':
      saveSettings(msg);
      break;
    case 'save-chapter-music':
      saveChapterMusic(msg.chapter, msg.music);
      break;
    case 'save-state':
      saveState();
      break;
    case 'load-list':
      loadMusicList().then(function() { renderMusicList(); });
      break;
    case 'get-chapter-music':
      getChapterMusic(msg.chapter || currentChapter).then(function(data) {
        sendToMain({ type: 'chapter-music-data', music: data.ok ? data.music : '' });
      });
      break;
  }
});

setTimeout(function() {
  sendToMain({ type: 'player-ready' });
}, 100);

// 定期广播心跳，让页面知道 popup 还活着
setInterval(function() {
  sendToMain({ type: 'heartbeat' });
}, 500);
</script>
</body>
</html>
